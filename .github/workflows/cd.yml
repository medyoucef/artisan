name: CD Deployment to Hostinger
on:
  push:
    branches:
      - main
jobs:
  # -----------------------------------------------
  # GATE : Bloquer le déploiement si secret détecté
  # -----------------------------------------------
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: gitleaks          # ← déploiement bloqué si gitleaks fail
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, intl
          coverage: none
      - name: Install Composer dev dependencies
        run: composer install
      - name: Run static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=1G
      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader
      - name: Build frontend
        run: |
          if [ -f package.json ]; then
            npm install
            npm run build
          fi
      - name: Prepare Laravel for production
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git**
            **/.github**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/_sokrates/**
            artisan
            *.sql